<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <clipPath id="bg-clip-s">
      <rect width="192" height="192" rx="42" ry="42"/>
    </clipPath>
    <clipPath id="photo-clip-s">
      <rect x="48" y="59" width="96" height="74" rx="9"/>
    </clipPath>
    <clipPath id="lens-clip-s">
      <circle cx="118" cy="113" r="17"/>
    </clipPath>
    <linearGradient id="sky-s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8D4BE"/>
      <stop offset="100%" stop-color="#A8B89E"/>
    </linearGradient>
  </defs>

  <!-- Background: parchment -->
  <rect width="192" height="192" rx="42" ry="42" fill="#F7F4EE"/>

  <!-- Subtle grid lines -->
  <g clip-path="url(#bg-clip-s)" stroke="#D8D2C4" stroke-width="0.6" opacity="0.7">
    <line x1="0" y1="48" x2="192" y2="48"/>
    <line x1="0" y1="96" x2="192" y2="96"/>
    <line x1="0" y1="144" x2="192" y2="144"/>
    <line x1="48" y1="0" x2="48" y2="192"/>
    <line x1="96" y1="0" x2="96" y2="192"/>
    <line x1="144" y1="0" x2="144" y2="192"/>
  </g>

  <!-- Back photo card (rotated left) -->
  <rect x="48" y="59" width="96" height="74" rx="9"
        fill="#EDE9DE" stroke="#C8BEA8" stroke-width="1.2"
        transform="rotate(-9 96 96)"/>

  <!-- Middle photo card (rotated right) -->
  <rect x="48" y="59" width="96" height="74" rx="9"
        fill="#fff" stroke="#C8BEA8" stroke-width="1.2"
        transform="rotate(5 96 96)"/>

  <!-- Main photo card -->
  <rect x="48" y="59" width="96" height="74" rx="9"
        fill="#fff" stroke="#C8BEA8" stroke-width="1.2"/>

  <!-- Sky wash -->
  <rect x="48" y="59" width="96" height="74" rx="9"
        fill="url(#sky-s)" opacity="0.55" clip-path="url(#photo-clip-s)"/>

  <!-- Sun -->
  <circle cx="122" cy="76" r="10" fill="#F7C87A" opacity="0.95"
          clip-path="url(#photo-clip-s)"/>

  <!-- Hills -->
  <ellipse cx="65" cy="133" rx="41" ry="26"
           fill="#7A8C6E" clip-path="url(#photo-clip-s)"/>
  <ellipse cx="116" cy="135" rx="38" ry="23"
           fill="#5A7050" clip-path="url(#photo-clip-s)"/>
  <ellipse cx="158" cy="139" rx="34" ry="21"
           fill="#7A8C6E" clip-path="url(#photo-clip-s)"/>

  <!-- Magnifying glass handle -->
  <line x1="133" y1="128" x2="149" y2="144"
        stroke="#1C1C18" stroke-width="7.5" stroke-linecap="round"/>

  <!-- Magnifying glass outer ring -->
  <circle cx="118" cy="113" r="26"
          fill="white" stroke="#1C1C18" stroke-width="4"/>

  <!-- Inner accent ring -->
  <circle cx="118" cy="113" r="17"
          fill="none" stroke="#B5935A" stroke-width="2.5"/>

  <!-- Tiny landscape inside lens -->
  <rect x="101" y="96" width="34" height="34"
        fill="#C8D4BE" opacity="0.5" clip-path="url(#lens-clip-s)"/>
  <ellipse cx="112" cy="130" rx="14" ry="8"
           fill="#7A8C6E" clip-path="url(#lens-clip-s)"/>
  <ellipse cx="126" cy="132" rx="11" ry="7"
           fill="#5A7050" clip-path="url(#lens-clip-s)"/>
  <circle cx="126" cy="101" r="4"
          fill="#F7C87A" opacity="0.9" clip-path="url(#lens-clip-s)"/>
</svg>
